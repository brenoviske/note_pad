<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Pad | Premium Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #eff6ff 100%);
        }
        .note-card {
            animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .hidden { display: none !important; }
        .modal-bg { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="text-slate-900 min-h-screen overflow-hidden">

    <div id="deleteModal" class="fixed inset-0 z-50 flex items-center justify-center hidden p-4 modal-bg">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl">
            <h3 class="text-xl font-bold text-slate-900 tracking-tight text-center">Delete Note? 🗑️</h3>
            <p class="text-slate-500 mt-2 text-sm text-center">This thought will be permanently removed from your library.</p>
            <div class="flex gap-3 mt-8">
                <button onclick="closeDeleteModal()" class="flex-1 px-4 py-3 text-xs font-bold text-slate-400 uppercase tracking-widest">Cancel</button>
                <button id="confirmDeleteBtn" class="flex-1 px-4 py-3 rounded-2xl text-xs font-bold bg-red-500 text-white uppercase tracking-widest hover:bg-red-600 shadow-lg shadow-red-200 transition-all">Confirm</button>
            </div>
        </div>
    </div>

    <div class="max-w-[1440px] mx-auto px-6 h-screen flex flex-col py-8">

        <header class="flex items-center justify-between mb-8 shrink-0">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tighter text-slate-900">Note<span class="text-blue-600">Pad.</span></h1>
            </div>
        </header>

        <main class="grid lg:grid-cols-12 gap-8 flex-grow overflow-hidden">

            <aside class="lg:col-span-4 xl:col-span-3">
                <div class="glass rounded-[2rem] p-8 shadow-xl shadow-blue-100/50 border border-white h-fit">
                    <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">New Entry 📝</h2>

                    <form id="noteForm" class="space-y-6">
                        <input type="text" name="title" required
                            class="w-full px-5 py-4 bg-white/50 border border-slate-100 focus:border-blue-500 outline-none rounded-2xl transition-all font-medium placeholder:text-slate-300 shadow-sm"
                            placeholder="Think of a title...">

                        <textarea name="content" rows="6" required
                            class="w-full px-5 py-4 bg-white/50 border border-slate-100 focus:border-blue-500 outline-none rounded-2xl resize-none transition-all placeholder:text-slate-300 shadow-sm"
                            placeholder="Write something beautiful..."></textarea>

                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all shadow-xl shadow-blue-200">
                            Save Note
                        </button>
                    </form>
                </div>
            </aside>

            <section class="lg:col-span-8 xl:col-span-9 flex flex-col overflow-hidden">

                <div class="mb-6 shrink-0 relative">
                    <input type="text" id="searchInput"
                        class="w-full pl-14 pr-6 py-5 bg-white border border-slate-200 rounded-[1.5rem] focus:ring-4 focus:ring-blue-500/5 outline-none focus:border-blue-300 transition-all text-lg font-medium shadow-sm"
                        placeholder="Search your library... 🔍">
                </div>

                <div id="notesContainer" class="flex-grow overflow-y-auto pr-4 space-y-4 custom-scrollbar">
                    <div id="emptyMessage" class="py-32 text-center rounded-[3rem] border-4 border-dashed border-slate-200/50 bg-slate-50/30">
                        <p class="text-slate-400 font-semibold tracking-tight">Your library is empty.</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        /**
         * 1. SECURITY & AUTHENTICATION BOUNCER
         * This must run before anything else to prevent unauthorized flashes of content.
         */
        const token = localStorage.getItem('notepad_token');
        if (!token) {
            window.location.href = '/login';
        }

        /**
         * 2. UI ELEMENT SELECTION
         */
        const noteForm = document.getElementById('noteForm');
        const notesContainer = document.getElementById('notesContainer');
        const emptyMessage = document.getElementById('emptyMessage');
        const deleteModal = document.getElementById('deleteModal');
        const searchInput = document.getElementById('searchInput');
        let noteIdToDelete = null;

        /**
         * 3. AUTHENTICATED FETCH WRAPPER
         * A helper to include the Bearer token in every request automatically.
         */
        const authHeader = () => ({
            'Authorization': `Bearer ${token}`
        });

        // --- HYDRATION (LOAD ALL) ---
        async function loadNotes() {
            try {
                const response = await fetch('/notes', {
                    headers: authHeader()
                });

                // If the token is expired or fake, kick them back to login
                if (response.status === 401) {
                    localStorage.removeItem('notepad_token');
                    window.location.href = '/login';
                    return;
                }

                const notes = await response.json();
                if (notes.length > 0) {
                    emptyMessage.style.display = 'none';
                    notes.forEach(note => {
                        notesContainer.appendChild(createNoteCard(note.id, note.title, note.content));
                    });
                }
            } catch (err) {
                console.error("Load failed:", err);
            }
        }

        // --- LIVE SEARCH LOGIC ---
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.note-card');

            cards.forEach(card => {
                const title = card.querySelector('h3').innerText.toLowerCase();
                card.classList.toggle('hidden', !title.includes(term));
            });
        });

        // --- CRUD ACTIONS (PROTECTED) ---

        // CREATE
        noteForm.onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(noteForm);

            try {
                const response = await fetch('/notes/add', {
                    method: 'POST',
                    headers: authHeader(), // Secure!
                    body: formData
                });

                const data = await response.json();
                if (data.status === 'success') {
                    emptyMessage.style.display = 'none';
                    notesContainer.prepend(createNoteCard(data.id, formData.get('title'), formData.get('content')));
                    noteForm.reset();
                }
            } catch (err) {
                console.error(err);
            }
        };

        // DELETE
        async function deleteNote(id) {
            try {
                const response = await fetch('/notes/delete', {
                    method: 'DELETE',
                    headers: {
                        ...authHeader(), // Merge auth header with your ID header
                        'id': id
                    }
                });
                const data = await response.json();
                if (data.status === 'success') {
                    document.getElementById(`card-${id}`).remove();
                    closeDeleteModal();
                    if (notesContainer.children.length === 1) emptyMessage.style.display = 'block';
                }
            } catch (err) {
                console.error(err);
            }
        }

        // UPDATE
        async function updateNote(id) {
            const editForm = document.getElementById(`edit-form-${id}`);
            const formData = new FormData(editForm);

            try {
                const response = await fetch('/notes/update', {
                    method: 'PUT',
                    headers: {
                        ...authHeader(),
                        'id': id
                    },
                    body: formData
                });
                const data = await response.json();
                if (data.status === 'success') {
                    document.getElementById(`title-display-${id}`).innerText = editForm.title.value;
                    document.getElementById(`content-display-${id}`).innerText = editForm.content.value;
                    toggleEdit(id);
                }
            } catch (err) {
                console.error(err);
            }
        }

        /**
         * 4. UI HELPERS & TEMPLATES (No Auth needed here)
         */
        const createNoteCard = (id, title, content) => {
            const div = document.createElement('div');
            div.id = `card-${id}`;
            div.className = "note-card bg-white border border-slate-200 p-6 rounded-2xl shadow-sm hover:shadow-md transition-all duration-300 group";
            div.innerHTML = `
            <div id="view-container-${id}">
                <div class="flex justify-between items-start mb-3">
                    <h3 class="text-lg font-semibold text-slate-800 group-hover:text-blue-600 transition-colors" id="title-display-${id}">${title}</h3>
                    <div class="flex gap-3 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="toggleEdit(${id})" class="text-sm grayscale hover:grayscale-0 transition-all">✏️</button>
                        <button onclick="openDeleteModal(${id})" class="text-sm grayscale hover:grayscale-0 transition-all">🗑️</button>
                    </div>
                </div>
                <p class="text-slate-500 leading-relaxed text-sm whitespace-pre-line" id="content-display-${id}">${content}</p>
            </div>

            <form id="edit-form-${id}" class="hidden space-y-4">
                <input type="text" name="title" value="${title}"
                    class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-100 focus:border-blue-400 outline-none font-medium transition-all">
                <textarea name="content" rows="3"
                    class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-100 focus:border-blue-400 outline-none text-sm transition-all">${content}</textarea>
                <div class="flex gap-3 justify-end items-center">
                    <span id="feedback-${id}" class="text-[10px] font-bold uppercase hidden"></span>
                    <button type="button" onclick="toggleEdit(${id})" class="text-[10px] text-slate-400 font-bold uppercase hover:text-slate-600">Cancel</button>
                    <button type="button" onclick="updateNote(${id})" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-lg text-xs font-bold uppercase transition-colors">Update</button>
                </div>
            </form>
        `;
            return div;
        };

        function openDeleteModal(id) {
            noteIdToDelete = id;
            deleteModal.classList.remove('hidden');
        }

        function closeDeleteModal() {
            deleteModal.classList.add('hidden');
            noteIdToDelete = null;
        }

        function toggleEdit(id) {
            document.getElementById(`view-container-${id}`).classList.toggle('hidden');
            document.getElementById(`edit-form-${id}`).classList.toggle('hidden');
        }

        document.getElementById('confirmDeleteBtn').onclick = () => deleteNote(noteIdToDelete);
        window.addEventListener('DOMContentLoaded', loadNotes);
    </script>
</body>
</html>
