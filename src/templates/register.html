<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | NotePad Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #eff6ff 100%);
        }

        .glass-signup {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 25px 50px -12px rgba(30, 41, 59, 0.08);
        }

        .input-box {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-box:focus-within {
            transform: translateY(-2px);
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-main {
            animation: slideInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.05) 0%, rgba(255, 255, 255, 0) 70%);
            z-index: -1;
        }
    </style>
</head>
<body class="text-slate-900 min-h-screen flex items-center justify-center p-6 relative overflow-hidden">

<div class="bg-glow"></div>

<div class="max-w-4xl w-full animate-main">

    <div class="text-center mb-12">
        <h1 class="text-5xl font-extrabold tracking-tighter text-slate-900">
            Note<span class="text-blue-600">Pad.</span>
        </h1>
        <p class="text-slate-500 mt-4 font-medium text-lg">Create your professional workspace today.</p>
    </div>

    <div class="glass-signup rounded-[3.5rem] p-10 md:p-14">
        <form id="signupForm" class="space-y-10">

            <div class="grid md:grid-cols-2 gap-8">
                <div class="space-y-3 input-box">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Username</label>
                    <input type="text" name="username" required
                           class="w-full px-7 py-5 bg-white/50 border border-slate-100 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/5 outline-none rounded-[1.5rem] transition-all font-medium shadow-sm"
                           placeholder="username">
                </div>
                <div class="space-y-3 input-box">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Email
                        Address</label>
                    <input type="email" name="email" required
                           class="w-full px-7 py-5 bg-white/50 border border-slate-100 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/5 outline-none rounded-[1.5rem] transition-all font-medium shadow-sm"
                           placeholder="name@email.com">
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-8">
                <div class="space-y-3 input-box">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Password</label>
                    <input type="password" id="password" name="password_hash" required
                           class="w-full px-7 py-5 bg-white/50 border border-slate-100 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/5 outline-none rounded-[1.5rem] transition-all font-medium shadow-sm"
                           placeholder="••••••••">

                    <div class="px-2">
                        <div class="h-1 w-full bg-slate-100 rounded-full overflow-hidden mt-3">
                            <div id="strengthBar" class="h-full w-0 transition-all duration-500 bg-red-400"></div>
                        </div>
                        <div class="flex justify-between items-center mt-2">
                            <span id="strengthText"
                                  class="text-[10px] font-black uppercase tracking-widest text-slate-300">Security Level</span>
                            <span id="strengthLabel"
                                  class="text-[10px] font-black uppercase tracking-widest text-slate-400">Weak</span>
                        </div>
                    </div>
                </div>

                <div class="space-y-3 input-box">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Confirm
                        Password</label>
                    <input type="password" id="confirm_password" required
                           class="w-full px-7 py-5 bg-white/50 border border-slate-100 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/5 outline-none rounded-[1.5rem] transition-all font-medium shadow-sm"
                           placeholder="••••••••">
                    <div class="px-2 mt-3">
                        <p id="matchText"
                           class="text-[10px] font-black uppercase tracking-widest opacity-0 transition-opacity text-red-400">
                            Passwords do not match</p>
                    </div>
                </div>
            </div>

            <div id="statusMessage" class="hidden rounded-2xl p-4 text-xs font-bold uppercase tracking-widest text-center animate-pulse">
                </div>

            <div class="flex flex-col md:flex-row items-center justify-between gap-8 pt-6">
                <p class="text-sm font-medium text-slate-400 order-2 md:order-1">
                    Already have an account? <a href="/" class="text-blue-600 font-bold hover:underline">Sign In</a>
                </p>
                <button type="submit" id="submitBtn"
                        class="w-full md:w-auto md:px-16 bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-2xl transition-all shadow-xl shadow-blue-200 hover:shadow-blue-300 active:scale-95 order-1 md:order-2">
                    Create Account
                </button>
            </div>
        </form>
    </div>

    <p class="text-center mt-12 text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">
        Precision Tooling for Backend Engineers
    </p>
</div>

<script>
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm_password');
    const strengthBar = document.getElementById('strengthBar');
    const strengthLabel = document.getElementById('strengthLabel');
    const matchText = document.getElementById('matchText');
    const signupForm = document.getElementById('signupForm');
    const statusMessage = document.getElementById('statusMessage');
    const submitBtn = document.getElementById('submitBtn');

    // 1. Password Strength Logic
    passwordInput.addEventListener('input', () => {
        const val = passwordInput.value;
        let score = 0;
        if (val.length >= 8) score += 25;
        if (val.match(/[A-Z]/)) score += 25;
        if (val.match(/[0-9]/)) score += 25;
        if (val.match(/[^A-Za-z0-9]/)) score += 25;

        strengthBar.style.width = score + '%';
        if (score <= 25) {
            strengthBar.style.backgroundColor = '#f87171';
            strengthLabel.innerText = 'Weak';
            strengthLabel.style.color = '#f87171';
        } else if (score <= 75) {
            strengthBar.style.backgroundColor = '#fbbf24';
            strengthLabel.innerText = 'Moderate';
            strengthLabel.style.color = '#fbbf24';
        } else {
            strengthBar.style.backgroundColor = '#34d399';
            strengthLabel.innerText = 'Strong';
            strengthLabel.style.color = '#34d399';
        }
        validateMatching();
    });

    // 2. Password Matching Logic
    function validateMatching() {
        if (confirmInput.value === "") {
            matchText.classList.add('opacity-0');
            return;
        }
        matchText.classList.remove('opacity-0');
        if (passwordInput.value === confirmInput.value) {
            matchText.innerText = 'Passwords Match ✓';
            matchText.style.color = '#34d399';
        } else {
            matchText.innerText = 'Passwords do not match';
            matchText.style.color = '#f87171';
        }
    }
    confirmInput.addEventListener('input', validateMatching);

    // 3. UI Message Helper
    function showStatus(msg, type) {
        statusMessage.innerText = msg;
        statusMessage.className = `rounded-2xl p-4 text-[10px] font-black uppercase tracking-[0.2em] text-center block ${
            type === 'error' ? 'bg-red-50 text-red-500' : 'bg-emerald-50 text-emerald-600'
        }`;
    }

    // 4. AJAX Integration
    signupForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        statusMessage.className = 'hidden'; // Reset

        if (passwordInput.value !== confirmInput.value) {
            showStatus("Passwords do not match", "error");
            return;
        }

        const formData = new FormData(signupForm);
        const data = Object.fromEntries(formData.entries());

        submitBtn.disabled = true;
        submitBtn.innerText = "Processing...";

        try {
            const response = await fetch('/users/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (result.status === 'success') {
                showStatus("Success! Redirecting to workspace...", "success");
                setTimeout(() => window.location.href = '/', 600);
            } else {
                showStatus(result.message || "Registration failed", "error");
                submitBtn.disabled = false;
                submitBtn.innerText = "Create Account";
            }
        } catch (error) {
            showStatus("Connection error. Try again.", "error");
            submitBtn.disabled = false;
            submitBtn.innerText = "Create Account";
        }
    });
</script>
</body>
</html>
