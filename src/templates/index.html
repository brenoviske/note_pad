<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NotePad Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #eff6ff 100%);
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.15) 0%, rgba(248, 250, 252, 0) 100%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
        }

        .glass-login {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 25px 50px -12px rgba(30, 41, 59, 0.1);
        }

        .input-focus-effect:focus {
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            transform: translateY(-1px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-entrance {
            animation: fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
    </style>
</head>
<body class="text-slate-900 min-h-screen flex items-center justify-center p-6 relative overflow-hidden">

<div class="blob -top-24 -left-24"></div>
<div class="blob -bottom-24 -right-24"
     style="background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(248, 250, 252, 0) 100%);"></div>

<div class="max-w-[480px] w-full animate-entrance">

    <div class="text-center mb-10">
        <h1 class="text-4xl font-extrabold tracking-tighter text-slate-900">Note<span class="text-blue-600">Pad.</span>
        </h1>
        <p class="text-slate-500 mt-3 font-medium">Welcome back to your digital sanctuary.</p>
    </div>

    <div class="glass-login rounded-[2.5rem] p-10 md:p-12">
        <form id="loginForm" class="space-y-7">

            <div class="space-y-2">
                <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Email Address</label>
                <div class="relative">
                    <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400">📧</span>
                    <input type="email" name="email" required
                           class="w-full pl-14 pr-6 py-4 bg-white/50 border border-slate-100 focus:border-blue-500 outline-none rounded-2xl transition-all font-medium placeholder:text-slate-300 shadow-sm input-focus-effect"
                           placeholder="name@company.com">
                </div>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center ml-1">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest">Password</label>
                    <a href="#" class="text-[10px] font-bold text-blue-600 uppercase tracking-wider hover:underline">Forgot?</a>
                </div>
                <div class="relative">
                    <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400">🔒</span>
                    <input type="password" name="password" required
                           class="w-full pl-14 pr-6 py-4 bg-white/50 border border-slate-100 focus:border-blue-500 outline-none rounded-2xl transition-all font-medium placeholder:text-slate-300 shadow-sm input-focus-effect"
                           placeholder="••••••••">
                </div>
            </div>

            <div id="statusMessage"
                 class="hidden rounded-xl p-4 text-[10px] font-black uppercase tracking-widest text-center"></div>

            <div class="pt-2">
                <button type="submit" id="submitBtn"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-2xl transition-all shadow-xl shadow-blue-200 active:scale-[0.98]">
                    Sign In
                </button>
            </div>

            <div class="relative py-4">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-slate-100"></div>
                </div>
                <div class="relative flex justify-center text-xs uppercase"><span
                        class="bg-white/0 px-4 text-slate-400 font-bold tracking-widest">Or continue with</span></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button type="button"
                        class="flex items-center justify-center gap-2 py-4 bg-white border border-slate-100 rounded-2xl hover:bg-slate-50 transition-all font-semibold text-sm shadow-sm">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
                    Google
                </button>
                <button type="button"
                        class="flex items-center justify-center gap-2 py-4 bg-white border border-slate-100 rounded-2xl hover:bg-slate-50 transition-all font-semibold text-sm shadow-sm">
                    <img src="https://www.svgrepo.com/show/475647/github-color.svg" class="w-5 h-5" alt="GitHub">
                    GitHub
                </button>
            </div>
        </form>
    </div>

    <p class="text-center mt-8 text-slate-500 text-sm">
        Don't have an account?
        <a href="/register" class="text-blue-600 font-bold hover:underline">Create an entry</a>
    </p>
</div>

<script>
    const loginForm = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusMessage = document.getElementById('statusMessage');

    function showStatus(msg, type) {
        statusMessage.innerText = msg;
        statusMessage.className = `rounded-xl p-4 text-[10px] font-black uppercase tracking-widest text-center block ${
                type === 'error' ? 'bg-red-50 text-red-500' : 'bg-emerald-50 text-emerald-600'
                }`;
    }

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        statusMessage.className = 'hidden';

        const formData = new FormData(loginForm);
        const data = Object.fromEntries(formData.entries());

        submitBtn.disabled = true;
        submitBtn.innerText = "Authenticating...";

        try {
            const response = await fetch('/users/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (result.status === 'success') {

                // Saving here the jwt code so that it can be used after in other areas of the application
                // This token is also used to make users authentication

                localStorage.setItem('notepad_token', result.access_token);

                showStatus("Access Granted. Redirecting...", "success");
                // Small delay for the user to see the success message
                setTimeout(() => window.location.href = '/main' , 500);
            } else {
                showStatus(result.message || "Invalid credentials", "error");
                submitBtn.disabled = false;
                submitBtn.innerText = "Sign In";
            }
        } catch (error) {
            showStatus("Server unreachable. Please try again.", "error");
            submitBtn.disabled = false;
            submitBtn.innerText = "Sign In";
        }
    });
</script>

</body>
</html>
