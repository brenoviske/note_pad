<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Pad | Minimal Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .note-card { animation: slideUp 0.4s ease-out forwards; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hidden { display: none; }
        .modal-bg { background-color: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 min-h-screen">

    <div id="deleteModal" class="fixed inset-0 z-50 flex items-center justify-center hidden p-4 modal-bg">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full shadow-2xl border border-slate-100">
            <h3 class="text-xl font-semibold text-slate-900">Delete Note?</h3>
            <p class="text-slate-500 mt-2 text-sm leading-relaxed">This action cannot be undone. This thought will be permanently removed from your repository.</p>
            <div class="flex gap-3 mt-8">
                <button onclick="closeDeleteModal()" class="flex-1 px-4 py-2.5 rounded-xl text-sm font-bold text-slate-400 uppercase tracking-tight hover:bg-slate-50 transition-colors">Cancel</button>
                <button id="confirmDeleteBtn" class="flex-1 px-4 py-2.5 rounded-xl text-sm font-bold bg-red-50 text-red-600 uppercase tracking-tight hover:bg-red-600 hover:text-white transition-all duration-300">Delete</button>
            </div>
        </div>
    </div>

    <div class="max-w-2xl mx-auto px-6 py-16">
        <header class="mb-12">
            <h1 class="text-4xl font-light tracking-tight text-slate-900">Note <span class="font-semibold text-blue-600">Pad</span></h1>
            <p class="text-slate-400 mt-2 text-sm font-medium uppercase tracking-widest">Personal Repository</p>
        </header>

        <section class="mb-16">
            <form id="noteForm" class="bg-white border border-slate-200 rounded-2xl p-2 shadow-sm focus-within:shadow-md focus-within:border-blue-200 transition-all duration-300">
                <input type="text" id="noteTitle" required name="title"
                    class="w-full px-5 py-4 text-lg font-medium placeholder:text-slate-300 focus:outline-none rounded-t-xl"
                    placeholder="Title of your thought...">
                <div class="h-[1px] bg-slate-100 mx-5"></div>
                <textarea id="noteContent" rows="3" required name="content"
                    class="w-full px-5 py-4 text-slate-600 placeholder:text-slate-300 focus:outline-none resize-none"
                    placeholder="Write something beautiful..."></textarea>
                <div class="flex justify-between items-center p-3 bg-slate-50/50 rounded-b-xl border-t border-slate-50">
                    <span id="formFeedback" class="text-xs font-bold px-3 uppercase hidden"></span>
                    <button type="submit"
                        class="bg-slate-900 hover:bg-blue-600 text-white text-sm font-medium py-2 px-6 rounded-lg transition-all duration-300 active:scale-95">
                        Save Note
                    </button>
                </div>
            </form>
        </section>

        <section>
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Recent Notes</h2>
                <div class="h-[1px] flex-grow ml-4 bg-slate-200/60"></div>
            </div>

            <div id="notesContainer" class="space-y-6">
                <div id="emptyMessage" class="py-12 text-center border-2 border-dashed border-slate-200 rounded-2xl">
                    <p class="text-slate-300 text-sm italic">The pad is currently empty.</p>
                </div>
            </div>
        </section>
    </div>

    <script>
        const noteForm = document.getElementById('noteForm');
        const notesContainer = document.getElementById('notesContainer');
        const emptyMessage = document.getElementById('emptyMessage');
        const deleteModal = document.getElementById('deleteModal');
        let noteIdToDelete = null;

        // --- HYDRATION (LOAD ALL) ---
        async function loadNotes() {
            try {
                const response = await fetch('/notes');
                const notes = await response.json();
                if (notes.length > 0) {
                    emptyMessage.style.display = 'none';
                    notes.forEach(note => {
                        notesContainer.appendChild(createNoteCard(note.id, note.title, note.content));
                    });
                }
            } catch (err) { console.error("Load failed:", err); }
        }
        window.addEventListener('DOMContentLoaded', loadNotes);

        // --- CARD FACTORY ---
        const createNoteCard = (id, title, content) => {
            const div = document.createElement('div');
            div.id = `card-${id}`;
            div.className = "note-card bg-white border border-slate-200 p-6 rounded-2xl shadow-sm hover:shadow-md transition-all duration-300 group";
            div.innerHTML = `
                <div id="view-container-${id}">
                    <div class="flex justify-between items-start mb-3">
                        <h3 class="text-lg font-semibold text-slate-800 group-hover:text-blue-600 transition-colors" id="title-display-${id}">${title}</h3>
                        <div class="flex gap-3 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="toggleEdit(${id})" class="text-sm grayscale hover:grayscale-0 transition-all">✏️</button>
                            <button onclick="openDeleteModal(${id})" class="text-sm grayscale hover:grayscale-0 transition-all">🗑️</button>
                        </div>
                    </div>
                    <p class="text-slate-500 leading-relaxed text-sm whitespace-pre-line" id="content-display-${id}">${content}</p>
                </div>

                <form id="edit-form-${id}" class="hidden space-y-4">
                    <input type="text" name="title" value="${title}"
                        class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-100 focus:border-blue-400 outline-none font-medium transition-all">
                    <textarea name="content" rows="3"
                        class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-100 focus:border-blue-400 outline-none text-sm transition-all">${content}</textarea>
                    <div class="flex gap-3 justify-end items-center">
                        <span id="feedback-${id}" class="text-[10px] font-bold uppercase hidden"></span>
                        <button type="button" onclick="toggleEdit(${id})" class="text-[10px] text-slate-400 font-bold uppercase hover:text-slate-600">Cancel</button>
                        <button type="button" onclick="updateNote(${id})" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-lg text-xs font-bold uppercase transition-colors">Update</button>
                    </div>
                </form>
            `;
            return div;
        };

        // --- MODAL LOGIC ---
        function openDeleteModal(id) {
            noteIdToDelete = id;
            deleteModal.classList.remove('hidden');
        }
        function closeDeleteModal() {
            deleteModal.classList.add('hidden');
            noteIdToDelete = null;
        }
        document.getElementById('confirmDeleteBtn').onclick = () => deleteNote(noteIdToDelete);

        // --- CRUD ACTIONS ---
        async function deleteNote(id) {
            try {
                const response = await fetch('/notes/delete', {
                    method: 'DELETE',
                    headers: {'id':id}
                });
                const data = await response.json();
                if (data.status === 'success') {
                    document.getElementById(`card-${id}`).remove();
                    closeDeleteModal();
                    if (notesContainer.children.length === 1) emptyMessage.style.display = 'block';
                }
            } catch (err) { console.error(err); }
        }

        async function updateNote(id) {
            const editForm = document.getElementById(`edit-form-${id}`);
            const formData = new FormData(editForm);

            try {
                const response = await fetch('/notes/update', {
                    method: 'PUT',
                    headers: { 'id': id },
                    body: formData
                });
                const data = await response.json();
                if (data.status === 'success') {
                    document.getElementById(`title-display-${id}`).innerText = editForm.title.value;
                    document.getElementById(`content-display-${id}`).innerText = editForm.content.value;
                    toggleEdit(id);
                }
            } catch (err) { console.error(err); }
        }

        noteForm.onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(noteForm);
            try {
                const response = await fetch('/notes/add', { method: 'POST', body: formData });
                const data = await response.json();
                if (data.status === 'success') {
                    emptyMessage.style.display = 'none';
                    notesContainer.prepend(createNoteCard(data.id, formData.get('title'), formData.get('content')));
                    noteForm.reset();
                }
            } catch (err) { console.error(err); }
        };

        function toggleEdit(id) {
            document.getElementById(`view-container-${id}`).classList.toggle('hidden');
            document.getElementById(`edit-form-${id}`).classList.toggle('hidden');
        }
    </script>
</body>
</html>
